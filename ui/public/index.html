<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenUnum Qwen ⚡</title>
  <style>
    :root {
      --bg: #0a0f1a;
      --bg2: #111827;
      --panel: #1a2332;
      --panel2: #243045;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --line: #374151;
      --accent: #22d3ee;
      --accent2: #818cf8;
      --good: #34d399;
      --warn: #fbbf24;
      --bad: #f87171;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, var(--bg), var(--bg2));
      color: var(--text);
      min-height: 100vh;
    }
    .layout { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; }
    
    /* Sidebar */
    .sidebar {
      background: linear-gradient(180deg, var(--panel), var(--panel2));
      border-right: 1px solid var(--line);
      padding: 20px;
    }
    .brand { font-size: 1.4em; font-weight: 700; margin-bottom: 4px; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .status { color: var(--muted); font-size: 0.85em; margin-bottom: 24px; }
    .nav-item {
      padding: 12px 16px;
      border-radius: 10px;
      cursor: pointer;
      margin-bottom: 8px;
      transition: all 0.2s;
      border: 1px solid transparent;
    }
    .nav-item:hover { background: rgba(34, 211, 238, 0.1); border-color: rgba(34, 211, 238, 0.3); }
    .nav-item.active { background: rgba(34, 211, 238, 0.15); border-color: var(--accent); color: var(--accent); }
    
    /* Main */
    .main { display: flex; flex-direction: column; }
    .header {
      padding: 20px 30px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .health-indicator { display: flex; align-items: center; gap: 8px; font-size: 0.9em; }
    .health-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--good); box-shadow: 0 0 10px var(--good); }
    .health-dot.degraded { background: var(--warn); box-shadow: 0 0 10px var(--warn); }
    .health-dot.unhealthy { background: var(--bad); box-shadow: 0 0 10px var(--bad); }
    
    /* Chat Area */
    .chat-container { flex: 1; display: flex; flex-direction: column; padding: 30px; max-width: 1000px; margin: 0 auto; width: 100%; }
    .messages { flex: 1; overflow-y: auto; margin-bottom: 20px; }
    .message {
      margin-bottom: 16px;
      padding: 14px 18px;
      border-radius: 12px;
      max-width: 85%;
      line-height: 1.5;
    }
    .message.user {
      align-self: flex-end;
      background: linear-gradient(135deg, var(--accent2), #6366f1);
      margin-left: auto;
      border-bottom-right-radius: 4px;
    }
    .message.ai {
      background: var(--panel);
      border: 1px solid var(--line);
      border-bottom-left-radius: 4px;
    }
    .message.system {
      align-self: center;
      background: rgba(52, 211, 153, 0.1);
      color: var(--good);
      border: 1px dashed rgba(52, 211, 153, 0.3);
      font-size: 0.85em;
      padding: 8px 16px;
      border-radius: 20px;
    }
    
    /* Composer */
    .composer {
      display: flex;
      gap: 12px;
      padding-top: 20px;
      border-top: 1px solid var(--line);
    }
    input[type="text"] {
      flex: 1;
      background: var(--panel);
      border: 1px solid var(--line);
      color: var(--text);
      padding: 14px 18px;
      border-radius: 10px;
      outline: none;
      font-size: 0.95em;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: var(--accent); }
    button {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: var(--bg);
      border: none;
      padding: 14px 24px;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
    }
    button:hover { opacity: 0.9; }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    
    /* Tool calls */
    .tool-call {
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: var(--bg2);
    }
    .tool-header {
      padding: 8px 12px;
      background: var(--panel2);
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8em;
      color: var(--accent);
      display: flex;
      justify-content: space-between;
    }
    .tool-content {
      padding: 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85em;
      background: #0d1117;
      color: #a5d6ff;
      white-space: pre-wrap;
      display: none;
    }
    .tool-call.expanded .tool-content { display: block; }
    
    /* Panels */
    .panel { display: none; padding: 30px; }
    .panel.active { display: block; }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .card h3 { margin-bottom: 12px; color: var(--accent); }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; }
    .stat { background: var(--bg2); padding: 12px; border-radius: 8px; text-align: center; }
    .stat-value { font-size: 1.8em; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: 0.8em; color: var(--muted); margin-top: 4px; }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">⚡ OpenUnum Qwen</div>
      <div class="status">Autonomous Assistant</div>
      <nav>
        <div class="nav-item active" data-panel="chat">💬 Chat</div>
        <div class="nav-item" data-panel="config">⚙️ Configuration</div>
        <div class="nav-item" data-panel="health">🏥 Health</div>
        <div class="nav-item" data-panel="memory">🧠 Memory</div>
        <div class="nav-item" data-panel="sync">🔄 Auto-Sync</div>
      </nav>
    </aside>

    <main class="main">
      <header class="header">
        <h2 id="panel-title">Chat</h2>
        <div class="health-indicator">
          <div class="health-dot" id="health-dot"></div>
          <span id="health-text">Checking...</span>
        </div>
      </header>

      <!-- Chat Panel -->
      <div id="chat-panel" class="panel active chat-container">
        <div class="messages" id="messages"></div>
        <div class="composer">
          <input type="text" id="chat-input" placeholder="What should I do?" />
          <button id="send-btn">Send</button>
        </div>
      </div>

      <!-- Config Panel -->
      <div id="config-panel" class="panel">
        <div class="card">
          <h3>Model Configuration</h3>
          <div id="config-form"></div>
        </div>
      </div>

      <!-- Health Panel -->
      <div id="health-panel" class="panel">
        <div class="card">
          <h3>System Health</h3>
          <div class="stat-grid" id="health-stats"></div>
        </div>
      </div>

      <!-- Memory Panel -->
      <div id="memory-panel" class="panel">
        <div class="card">
          <h3>Memory Search</h3>
          <input type="text" id="memory-search" placeholder="Search memories..." style="width:100%;margin-bottom:12px;" />
          <div id="memory-results"></div>
        </div>
      </div>

      <!-- Sync Panel -->
      <div id="sync-panel" class="panel">
        <div class="card">
          <h3>Git Auto-Sync Status</h3>
          <div id="sync-status"></div>
        </div>
      </div>
    </main>
  </div>

  <script>
    let ws = null;
    const messagesEl = document.getElementById('messages');
    const chatInput = document.getElementById('chat-input');
    const sendBtn = document.getElementById('send-btn');
    const healthDot = document.getElementById('health-dot');
    const healthText = document.getElementById('health-text');

    // Connect WebSocket
    function connectWS() {
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${window.location.host}/ws`);
      
      ws.onopen = () => {
        console.log('[WS] Connected');
        updateHealth('healthy');
      };
      
      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        handleMessage(data);
      };
      
      ws.onclose = () => {
        console.log('[WS] Disconnected, reconnecting...');
        setTimeout(connectWS, 3000);
        updateHealth('unhealthy');
      };
    }

    function handleMessage(data) {
      if (data.type === 'status') {
        addMessage('system', data.text);
      } else if (data.type === 'result') {
        addMessage('ai', formatResult(data.result));
        sendBtn.disabled = false;
      } else if (data.type === 'error') {
        addMessage('system', 'Error: ' + data.error);
        sendBtn.disabled = false;
      } else if (data.type === 'health') {
        updateHealth(data.status.overall);
        renderHealthStats(data.status);
      }
    }

    function addMessage(role, content) {
      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.innerHTML = content;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function formatResult(result) {
      let html = `<div><strong>Task:</strong> ${result.task}</div>`;
      if (result.completed) {
        html += `<div style="color:var(--good);margin-top:8px;">✅ Completed</div>`;
        html += `<div style="font-size:0.85em;color:var(--muted);">Proof: ${result.proof}</div>`;
      } else {
        html += `<div style="color:var(--warn);margin-top:8px;">⚠️ Incomplete</div>`;
      }
      if (result.results?.length) {
        html += `<div style="margin-top:12px;"><strong>Steps:</strong></div>`;
        result.results.forEach((r, i) => {
          html += `<div class="tool-call" onclick="this.classList.toggle('expanded')">
            <div class="tool-header">Step ${r.step}: ${r.tool || r.action} <span>${r.status === 'success' ? '✅' : '❌'}</span></div>
            <div class="tool-content">${JSON.stringify(r.result || r.error || r.response, null, 2)}</div>
          </div>`;
        });
      }
      return html;
    }

    function updateHealth(status) {
      healthDot.className = `health-dot ${status}`;
      healthText.textContent = status.charAt(0).toUpperCase() + status.slice(1);
    }

    function renderHealthStats(health) {
      const statsEl = document.getElementById('health-stats');
      statsEl.innerHTML = Object.entries(health.checks).map(([key, check]) => `
        <div class="stat">
          <div class="stat-value" style="color:${check.status === 'healthy' ? 'var(--good)' : check.status === 'degraded' ? 'var(--warn)' : 'var(--bad)'}">${check.status}</div>
          <div class="stat-label">${key}</div>
        </div>
      `).join('');
    }

    // Send chat message
    async function sendMessage() {
      const task = chatInput.value.trim();
      if (!task || !ws || ws.readyState !== WebSocket.OPEN) return;

      addMessage('user', task);
      chatInput.value = '';
      sendBtn.disabled = true;

      ws.send(JSON.stringify({ type: 'chat', task }));
    }

    sendBtn.addEventListener('click', sendMessage);
    chatInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    // Panel navigation
    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', () => {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        item.classList.add('active');
        const panelId = item.dataset.panel + '-panel';
        document.getElementById(panelId).classList.add('active');
        document.getElementById('panel-title').textContent = item.textContent.split(' ')[1] || item.textContent;
        
        if (item.dataset.panel === 'health') {
          ws.send(JSON.stringify({ type: 'health' }));
        }
      });
    });

    // Initialize
    connectWS();
    addMessage('system', '⚡ OpenUnum Qwen ready. What should I do?');
  </script>
</body>
</html>
